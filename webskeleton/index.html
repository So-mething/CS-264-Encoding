<html lang="en">
<head>

</head>
<body>

  <header>
    <h1>Multi-Cipher Encryption Tool</h1>
    <p>Programming Class Project</p>

  <main>

    <!-- Cipher Section -->
    <section>
      <h2>Message & Cipher</h2>

      <label for="message">Message</label>
      <textarea id="message" rows="4" placeholder="Type your message here"></textarea>

      <label for="cipher">Select Cipher</label>
      <select id="cipher">
        <option value="caesar">Caesar Cipher</option>
        <option value="vigenere">Vigenère Cipher</option>
        <option value="morse">Morse Code</option>
      </select>

      <label for="key">Key / Shift (if required)</label>
      <input type="text" id="key" placeholder="Enter key or shift">

      <button onclick="runCipher()">Run Cipher</button>
    </section>

    <!-- Output Section -->
    <section>
      <h2>Output</h2>
      <textarea id="output" rows="4" readonly placeholder="Result will appear here"></textarea>
    </section>

  </main>

  <footer>
    <p>© 2026 – Cipher Project</p>
  </footer>

  <script>
    function login() {
      alert("Login functionality not implemented yet.");
    }

    function runCipher() {
      document.getElementById("output").value = "Cipher output will appear here.";
    }

 const morseDictionary = {'a': '.-','b': '-...','c': '-.-.','d': '-..','e': '.',
 'f': '..-.','g': '--.','h': '....','i': '..','j': '.---',
 'k': '-.-','l': '.-..','m': '--','n': '-.','o': '---',
 'p': '.--.','q': '--.-','r': '.-.','s': '...','t': '-',
 'u': '..-','v':'...-','w': '.--','x': '-..-','y': '-.--',
 'z': '--..', 
 ' ': '/'
};

const reverseMorseDictionary = {};
for (let key in morseDictionary) {
    reverseMorseDictionary[morseDictionary[key]] = key;
}

function textToMorse() {
    let text = document.getElementById("inputText").value.toLowerCase();
    let result = "";

    for (let char of text) {
        if (morseDictionary[char]) {
            result += morseDictionary[char] + " ";
        }
    }

    document.getElementById("outputText").value = result.trim();
}

function morseToText() {
    let morse = document.getElementById("inputText").value;
    let codes = morse.split(" ");
    let result = "";

    for (let code of codes) {
        if (reverseMorseDictionary[code]) {
            result += reverseMorseDictionary[code];
        }
    }

    document.getElementById("outputText").value = result;
}
  </script>

</body>
</html>
